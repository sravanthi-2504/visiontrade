<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta
            name="description"
            content="Real-time Stock Market News & Analytics Platform"
    />

    <!-- Added: Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <!-- Added: Google Fonts for better typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Added: Meta tags for better SEO and social sharing -->
    <meta name="keywords" content="stock market, news, real-time, NSE, BSE, Sensex, Nifty" />
    <meta property="og:title" content="Market Pulse - Live Stock News" />
    <meta property="og:description" content="Real-time stock market news, analysis and insights" />
    <meta property="og:type" content="website" />

    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <title>Market Pulse | Live Stock News</title>

    <!-- Added: Preconnect for faster API calls -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- Added: Mobile-specific meta tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>
<noscript>
    <div style="
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        color: white;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        padding: 2rem;
        font-family: 'Inter', sans-serif;
        z-index: 9999;
      ">
        <i class="fas fa-exclamation-triangle" style="font-size: 3rem; margin-bottom: 1rem; color: #f59e0b;"></i>
        <h1 style="font-size: 2rem; margin-bottom: 1rem;">JavaScript Required</h1>
        <p style="font-size: 1.1rem; max-width: 600px; line-height: 1.6; color: #94a3b8;">
            This application requires JavaScript to function properly. Please enable JavaScript in your browser settings to continue.
        </p>
        <div style="margin-top: 2rem; color: #64748b; font-size: 0.9rem;">
            <p>Stock Market News Aggregator • Real-time Updates • Market Analysis</p>
        </div>
    </div>
</noscript>

<div id="root"></div>

<!-- Added: Loading animation that shows before React loads -->
<div id="loading-screen" style="
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9998;
      transition: opacity 0.3s ease;
    ">
    <div style="text-align: center;">
        <div style="
          width: 60px;
          height: 60px;
          border: 3px solid #3b82f6;
          border-top-color: transparent;
          border-radius: 50%;
          animation: spin 1s linear infinite;
          margin-bottom: 1.5rem;
        "></div>
        <h2 style="color: white; font-family: 'Inter', sans-serif; margin-bottom: 0.5rem;">
            Market Pulse
        </h2>
        <p style="color: #94a3b8; font-family: 'Inter', sans-serif;">
            Loading real-time market data...
        </p>
    </div>
</div>

<script>
    // Hide loading screen when React app loads
    window.addEventListener('load', function() {
        setTimeout(function() {
            document.getElementById('loading-screen').style.opacity = '0';
            setTimeout(function() {
                document.getElementById('loading-screen').style.display = 'none';
            }, 300);
        }, 500);
    });

    // CSS for loading animation
    const style = document.createElement('style');
    style.textContent = `
        @keyframes spin {
          0% { transform: rotate(0deg); }
          100% { transform: rotate(360deg); }
        }
      `;
    document.head.appendChild(style);
</script>
